<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One UI Knox Analytics</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-color: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow-x: hidden;
      margin: 0;
      padding: 0;
    }
    /* Hide scrollbars */
    ::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>
<body class="p-4 bg-black select-none">
  <div id="root"></div>

  <script>
    // Native injection fallback for testing in browsers
    const defaultData = {
      totalBlocks: 0,
      totalTimeSavedMinutes: 0,
      appsData: [],
      historyData: [
        { date: "Mon", count: 0 },
        { date: "Tue", count: 0 },
        { date: "Wed", count: 0 },
        { date: "Thu", count: 0 },
        { date: "Fri", count: 0 },
        { date: "Sat", count: 0 },
        { date: "Sun", count: 0 }
      ]
    };

    let appData = defaultData;
    if (window.AndroidInterface) {
      try {
        appData = JSON.parse(window.AndroidInterface.getAnalyticsData());
      } catch (e) {
        console.error("Failed to parse Android analytics data:", e);
      }
    }

    const { useState, useEffect } = React;
    const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, AreaChart, Area, CartesianGrid } = Recharts;

    function CustomTooltip({ active, payload, label }) {
      if (active && payload && payload.length) {
        return (
          React.createElement("div", { className: "bg-[#1C1D21] border border-[#2F3036] p-2.5 rounded-xl shadow-lg" },
            React.createElement("p", { className: "font-semibold text-xs text-[#8B949E] mb-1" }, label),
            React.createElement("p", { className: "font-bold text-sm text-[#3E82FC]" }, `${payload[0].name}: ${payload[0].value}`)
          )
        );
      }
      return null;
    }

    function App() {
      return (
        React.createElement("div", { className: "space-y-5" },
          // Stat grid
          React.createElement("div", { className: "grid grid-cols-2 gap-3" },
            React.createElement("div", { className: "bg-gradient-to-b from-[#171E2D] to-[#14161A] border border-[#1E283C] p-4 rounded-[24px]" },
              React.createElement("p", { className: "text-[#5CA3FF] text-xs font-semibold uppercase tracking-wider mb-1" }, "Interceptions"),
              React.createElement("p", { className: "text-2xl font-extrabold text-white" }, appData.totalBlocks),
              React.createElement("p", { className: "text-[#8B949E] text-[10px] mt-1" }, "Total direct blocks")
            ),
            React.createElement("div", { className: "bg-gradient-to-b from-[#1C2D1F] to-[#121A13] border border-[#234E27] p-4 rounded-[24px]" },
              React.createElement("p", { className: "text-[#4CD964] text-xs font-semibold uppercase tracking-wider mb-1" }, "Time Saved"),
              React.createElement("p", { className: "text-2xl font-extrabold text-white" }, `${appData.totalTimeSavedMinutes}m`),
              React.createElement("p", { className: "text-[#8B949E] text-[10px] mt-1" }, "Estimated waste cutoff")
            )
          ),

          // Bar Chart: Top Blocked Apps
          React.createElement("div", { className: "bg-[#121318] border border-[#1C1D21] p-5 rounded-[24px] space-y-3" },
            React.createElement("div", { className: "flex justify-between items-center" },
              React.createElement("h2", { className: "text-sm font-bold text-[#E5E5E5]" }, "Top Intercepted Apps"),
              React.createElement("span", { className: "text-[10px] text-[#8B949E]" }, "By total blocks")
            ),
            appData.appsData.length === 0 ? 
              React.createElement("div", { className: "h-[160px] flex flex-col justify-center items-center text-center space-y-2" },
                React.createElement("span", { className: "text-3xl" }, "🛡️"),
                React.createElement("p", { className: "text-xs font-semibold text-[#8B949E]" }, "No app interceptions recorded yet"),
                React.createElement("p", { className: "text-[10px] text-[#3C4048] max-w-[200px]" }, "Open a blocked application to populate statistics.")
              ) :
              React.createElement("div", { className: "h-[180px] w-full" },
                React.createElement(ResponsiveContainer, { width: "100%", height: "100%" },
                  React.createElement(BarChart, { data: appData.appsData, margin: { top: 10, right: 10, left: -25, bottom: 0 } },
                    React.createElement(XAxis, { dataKey: "name", stroke: "#8B949E", fontSize: 9, tickLine: false, axisLine: false }),
                    React.createElement(YAxis, { stroke: "#8B949E", fontSize: 9, tickLine: false, axisLine: false, allowDecimals: false }),
                    React.createElement(Tooltip, { content: React.createElement(CustomTooltip) }),
                    React.createElement(Bar, { dataKey: "count", fill: "#3E82FC", radius: [4, 4, 0, 0], name: "Blocks" })
                  )
                )
              )
          ),

          // Area Chart: Weekly Block Trends
          React.createElement("div", { className: "bg-[#121318] border border-[#1C1D21] p-5 rounded-[24px] space-y-3" },
            React.createElement("div", { className: "flex justify-between items-center" },
              React.createElement("h2", { className: "text-sm font-bold text-[#E5E5E5]" }, "Interception Trends"),
              React.createElement("span", { className: "text-[10px] text-[#8B949E]" }, "Last 7 days")
            ),
            React.createElement("div", { className: "h-[150px] w-full" },
              React.createElement(ResponsiveContainer, { width: "100%", height: "100%" },
                React.createElement(AreaChart, { data: appData.historyData, margin: { top: 10, right: 10, left: -25, bottom: 0 } },
                  React.createElement("defs", null,
                    React.createElement("linearGradient", { id: "colorCount", x1: "0", y1: "0", x2: "0", y2: "1" },
                      React.createElement("stop", { offset: "5%", stopColor: "#3E82FC", stopOpacity: 0.4 }),
                      React.createElement("stop", { offset: "95%", stopColor: "#3E82FC", stopOpacity: 0 })
                    )
                  ),
                  React.createElement(XAxis, { dataKey: "date", stroke: "#8B949E", fontSize: 9, tickLine: false, axisLine: false }),
                  React.createElement(YAxis, { stroke: "#8B949E", fontSize: 9, tickLine: false, axisLine: false, allowDecimals: false }),
                  React.createElement(Tooltip, { content: React.createElement(CustomTooltip) }),
                  React.createElement(Area, { type: "monotone", dataKey: "count", stroke: "#3E82FC", fillOpacity: 1, fill: "url(#colorCount)", strokeWidth: 2, name: "Blocks" })
                )
              )
            )
          )
        )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
